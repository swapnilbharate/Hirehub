# Database Configuration (reads from env vars on Render, falls back to localhost for local dev)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hirehub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# SQL Init - run schema.sql and data.sql on startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Secrets & Expiration (30 Days)
hirehub.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
hirehub.jwt.expiration-ms=2592000000

# Server Port
server.port=8080

# Logging Level
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# Gemini API Key (optional system environment override)
gemini.api.key=${GEMINI_API_KEY:default}
