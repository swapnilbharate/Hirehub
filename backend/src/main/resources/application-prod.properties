# Production Database Configuration - Render Internal PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate - auto create tables, don't drop!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# DISABLE SQL init scripts in production
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Secrets & Expiration (30 Days)
hirehub.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
hirehub.jwt.expiration-ms=2592000000

# Server Port
server.port=8080

# Logging Level
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# Gemini API Key
gemini.api.key=${GEMINI_API_KEY:default}
