# Production Database Configuration for Aiven MySQL
spring.datasource.url=jdbc:mysql://mysql-28a4893f-bharateswapnil969696-7ab4.i.aivencloud.com:28631/defaultdb?useSSL=true&allowPublicKeyRetrieval=true&verifyServerCertificate=false&enabledTLSProtocols=TLSv1.2,TLSv1.3&connectTimeout=10000&socketTimeout=30000
spring.datasource.username=avnadmin
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate - update mode (don't drop tables!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# DISABLE SQL init scripts in production (schema.sql drops all tables!)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

