<!DOCTYPE html>
<html>

<head>
  <title>Register - HireHub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">

  <style>
    body {
      background: linear-gradient(135deg, #10b981, #3b82f6);
    }

    .card {
      border-radius: 15px;
      animation: fadeIn 0.6s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">NexHire</span>
  </nav>

  <div class="d-flex justify-content-center align-items-center" style="height:90vh;">
    <div class="card p-4 shadow" style="width:360px;">

      <h3 class="text-center mb-3">Register</h3>

      <input id="name" class="form-control mb-2" placeholder="Full Name">
      <input id="email" class="form-control mb-2" placeholder="Email">
      <input id="password" type="password" class="form-control mb-2" placeholder="Password">

      <select id="role" class="form-control mb-3">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>

      <button onclick="register()" class="btn btn-success w-100">Register</button>

      <p class="text-center mt-3">
        <a href="login.html">Already have account?</a>
      </p>

    </div>
  </div>

  <script>
    const API = "http://localhost:5000/api";

    async function register() {
      try {
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const role = document.getElementById("role").value;

        // ✅ Validation
        if (!name || !email || !password) {
          alert("Please fill all fields ❌");
          return;
        }

        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role })
        });

        // ✅ Handle backend errors
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text);
        }

        const data = await res.json();

        console.log("REGISTER RESPONSE:", data);

        alert(data.msg || "Registered Successfully ✅");
        window.location = "login.html";

      } catch (err) {
        console.error("REGISTER ERROR:", err);
        alert("Registration failed ❌ (check console)");
      }
    }
  </script>

</body>

</html>
